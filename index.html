<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario Académico 2026 - FACEN</title>
    <link rel="shortcut icon" href="img/img.png" type="image/x-icon">
    
    <!-- Tailwind CSS para el diseño rápido y responsivo -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome para los íconos del pop-up -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel para compilar el código React (JSX) en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Animación para el pop-up */
        @keyframes fadeInZoom {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-modal {
            animation: fadeInZoom 0.2s ease-out forwards;
        }

        /* Marca de agua centrada en el fondo */
        .watermark-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vmin;
            height: 80vmin;
            max-width: 600px;
            max-height: 600px;
            opacity: 0.15; /* Opacidad para que parezca marca de agua. Puedes subirla o bajarla */
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 0;
        }
        
        .watermark-bg img {
            width: 100%;
            height: auto;
            object-fit: contain;
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 font-sans antialiased min-h-screen flex items-center justify-center p-2 md:p-6">

    <div id="root" class="w-full max-w-[1100px]"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- CÓDIGO DE COLORES EXACTO AL DE TU IMAGEN ---
        const EVENT_TYPES = {
            INICIO: { id: 'INICIO', color: 'bg-[#0052cc] text-white', icon: 'fas fa-book-open', label: 'INICIO DE CLASES' }, // Azul
            ORD: { id: 'ORD', color: 'bg-[#22c55e] text-white', icon: 'fas fa-graduation-cap', label: 'EXÁMENES ORDINARIOS' }, // Verde
            EXTRA: { id: 'EXTRA', color: 'bg-[#facc15] text-black', icon: 'fas fa-bolt', label: 'EXÁMENES EXTRAORDINARIOS' }, // Amarillo
            FERIADO: { id: 'FERIADO', color: 'bg-[#7c3aed] text-white', icon: 'fas fa-flag', label: 'FERIADOS Y ASUETOS' }, // Morado
            RECESO: { id: 'RECESO', color: 'bg-[#ef4444] text-white', icon: 'fas fa-snowflake', label: 'RECESO ACADÉMICO' }, // Rojo
            FIN: { id: 'FIN', color: 'bg-[#f97316] text-white', icon: 'fas fa-bell-slash', label: 'FIN DE CLASES' } // Naranja
        };

        // --- DATOS DEL PDF ---
        const eventsData = [
            // Inicios
            { date: '2026-04-13', type: 'INICIO', desc: 'Inicio 1er Cuatrimestre (2do a 5to Año)' },
            { date: '2026-08-03', type: 'INICIO', desc: 'Inicio 2do Cuatrimestre' },
            // Fines
            { date: '2026-07-03', type: 'FIN', desc: 'Fin de clases 1er Cuatrimestre' },
            { date: '2026-11-13', type: 'FIN', desc: 'Fin de clases 2do Cuatrimestre' },
            // Feriados
            { date: '2026-01-01', type: 'FERIADO', desc: 'Año Nuevo' },
            { date: '2026-02-16', type: 'FERIADO', desc: 'Carnaval' },
            { date: '2026-02-17', type: 'FERIADO', desc: 'Carnaval' },
            { date: '2026-03-24', type: 'FERIADO', desc: 'Día de la Memoria por la Verdad y la Justicia' },
            { date: '2026-04-02', type: 'FERIADO', desc: 'Día del Veterano y Caídos en Malvinas' },
            { date: '2026-04-03', type: 'FERIADO', desc: 'Viernes Santo' },
            { date: '2026-05-01', type: 'FERIADO', desc: 'Día del Trabajador' },
            { date: '2026-05-11', type: 'FERIADO', desc: 'Día de Fray Mamerto Esquiú' },
            { date: '2026-05-25', type: 'FERIADO', desc: 'Revolución de Mayo' },
            { date: '2026-06-17', type: 'FERIADO', desc: 'Paso a la Inmortalidad Gral. Güemes' },
            { date: '2026-06-20', type: 'FERIADO', desc: 'Paso a la Inmortalidad Gral. Belgrano' },
            { date: '2026-06-24', type: 'FERIADO', desc: 'Día de San Juan Bautista' },
            { date: '2026-07-05', type: 'FERIADO', desc: 'Fundación de Catamarca' },
            { date: '2026-07-09', type: 'FERIADO', desc: 'Día de la Independencia' },
            { date: '2026-08-17', type: 'FERIADO', desc: 'Paso a la Inmortalidad Gral. San Martín' },
            { date: '2026-09-07', type: 'FERIADO', desc: 'Día del Milagro' },
            { date: '2026-09-12', type: 'FERIADO', desc: 'Aniversario UNCA' },
            { date: '2026-09-17', type: 'FERIADO', desc: 'Día del Profesor' },
            { date: '2026-09-21', type: 'FERIADO', desc: 'Día del Estudiante' },
            { date: '2026-10-12', type: 'FERIADO', desc: 'Día de la Diversidad Cultural' },
            { date: '2026-11-20', type: 'FERIADO', desc: 'Día de la Soberanía Nacional' },
            { date: '2026-11-27', type: 'FERIADO', desc: 'Día del Trabajador No Docente' },
            { date: '2026-12-08', type: 'FERIADO', desc: 'Inmaculada Concepción' },
            { date: '2026-12-25', type: 'FERIADO', desc: 'Navidad' }
        ];

        // Rangos de eventos
        const rangeEvents = [
            { start: '2026-07-13', end: '2026-07-24', type: 'RECESO', desc: 'Receso Invernal' },
            { start: '2026-12-26', end: '2026-12-31', type: 'RECESO', desc: 'Receso Académico Anual' },
            { start: '2026-06-29', end: '2026-07-03', type: 'ORD', desc: 'Turno Ordinario Julio (1er Llamado)' },
            { start: '2026-08-10', end: '2026-08-14', type: 'ORD', desc: 'Turno Ordinario Julio (2do Llamado)' },
            { start: '2026-11-30', end: '2026-12-04', type: 'ORD', desc: 'Turno Ordinario Diciembre (1er Llamado)' },
            { start: '2026-12-14', end: '2026-12-18', type: 'ORD', desc: 'Turno Ordinario Diciembre (2do Llamado)' },
            { start: '2026-04-20', end: '2026-04-24', type: 'EXTRA', desc: 'Turno Extraordinario Abril' },
            { start: '2026-05-18', end: '2026-05-22', type: 'EXTRA', desc: 'Turno Extraordinario Mayo' },
            { start: '2026-09-28', end: '2026-10-02', type: 'EXTRA', desc: 'Turno Extraordinario Septiembre' },
            { start: '2026-10-26', end: '2026-10-30', type: 'EXTRA', desc: 'Turno Extraordinario Octubre' }
        ];

        // Lógica de fechas
        const getDaysInMonth = (year, month) => new Date(year, month + 1, 0).getDate();
        const getFirstDayOfMonth = (year, month) => {
            let day = new Date(year, month, 1).getDay();
            return day === 0 ? 6 : day - 1; // Lunes como primer día
        };

        const formatDate = (year, month, day) => {
            return `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        };

        const getEventForDate = (dateStr) => {
            // Los feriados tienen prioridad visual sobre los rangos
            const specificEvent = eventsData.find(e => e.date === dateStr);
            if (specificEvent) return specificEvent;

            const dateObj = new Date(dateStr);
            for (let range of rangeEvents) {
                const start = new Date(range.start);
                const end = new Date(range.end);
                if (dateObj >= start && dateObj <= end) {
                    return { type: range.type, desc: range.desc };
                }
            }
            return null;
        };

        const monthsNames = ["ENERO", "FEBRERO", "MARZO", "ABRIL", "MAYO", "JUNIO", "JULIO", "AGOSTO", "SEPTIEMBRE", "OCTUBRE", "NOVIEMBRE", "DICIEMBRE"];
        const daysOfWeek = ["L", "M", "X", "J", "V", "S", "D"]; // Usando la X para miércoles como en tu imagen

        // --- COMPONENTE: MES ---
        const MonthCalendar = ({ year, month, onDayClick }) => {
            const daysInMonth = getDaysInMonth(year, month);
            const firstDay = getFirstDayOfMonth(year, month);
            const days = [];

            for (let i = 0; i < firstDay; i++) {
                days.push(<div key={`empty-${i}`} className="p-1 w-6 h-6 md:w-7 md:h-7 mx-auto"></div>);
            }

            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = formatDate(year, month, d);
                const event = getEventForDate(dateStr);
                
                // Estilo por defecto (números azules oscuros como en tu foto)
                let baseClass = "w-6 h-6 md:w-7 md:h-7 flex items-center justify-center text-[11px] md:text-sm transition-all duration-200 mx-auto rounded-sm ";
                let colorClass = "text-[#1e3a8a] hover:bg-slate-200 cursor-pointer font-medium";
                
                // Si hay un evento, aplicamos el color correspondiente
                if (event) {
                    colorClass = `${EVENT_TYPES[event.type].color} font-bold cursor-pointer hover:scale-110 shadow-sm`;
                }

                days.push(
                    <div key={d} className="p-[2px]">
                        <button 
                            className={`${baseClass} ${colorClass}`}
                            onClick={() => onDayClick(dateStr, event)}
                        >
                            {d}
                        </button>
                    </div>
                );
            }

            return (
                <div className="relative z-10 flex flex-col items-center w-full mb-4">
                    <h3 className="text-[#3b0764] font-bold text-sm md:text-base tracking-widest mb-2 uppercase">{monthsNames[month]}</h3>
                    <div className="grid grid-cols-7 w-full max-w-[220px]">
                        {daysOfWeek.map((day, i) => (
                            <div key={i} className="text-[#3b0764] text-[10px] md:text-xs font-bold text-center mb-1">{day}</div>
                        ))}
                        {days}
                    </div>
                </div>
            );
        };

        // --- COMPONENTE: MODAL (Ventana Emergente de Detalles) ---
        const DayModal = ({ isOpen, dateStr, event, onClose }) => {
            if (!isOpen) return null;

            const dateObj = new Date(dateStr);
            dateObj.setMinutes(dateObj.getMinutes() + dateObj.getTimezoneOffset());
            const formattedDate = dateObj.toLocaleDateString('es-AR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm" onClick={onClose}>
                    <div 
                        className="animate-modal bg-white border border-slate-200 rounded-xl p-6 md:p-8 max-w-sm w-full shadow-2xl relative"
                        onClick={e => e.stopPropagation()} 
                    >
                        <button onClick={onClose} className="absolute top-4 right-4 text-slate-400 hover:text-slate-700 transition-colors">
                            <i className="fas fa-times text-xl"></i>
                        </button>
                        
                        <h3 className="text-xl font-black text-[#3b0764] capitalize mb-1">{formattedDate}</h3>
                        
                        {event ? (
                            <div className="mt-5 flex flex-col gap-3">
                                <div className={`inline-flex items-center gap-2 px-3 py-1.5 rounded text-sm font-bold ${EVENT_TYPES[event.type].color} w-fit`}>
                                    <i className={EVENT_TYPES[event.type].icon}></i>
                                    <span>{EVENT_TYPES[event.type].label}</span>
                                </div>
                                <p className="text-base text-slate-700 bg-slate-50 p-3 rounded-lg border border-slate-100">
                                    {event.desc}
                                </p>
                            </div>
                        ) : (
                            <div className="mt-5 p-4 rounded-lg bg-slate-50 border border-slate-100 text-slate-500 text-sm">
                                <i className="fas fa-info-circle mr-1"></i> Día sin eventos académicos destacados en el calendario.
                            </div>
                        )}
                        
                        <button onClick={onClose} className="mt-6 w-full py-2 bg-[#3b0764] hover:bg-[#2a0548] text-white font-bold rounded-lg transition-colors">
                            Entendido
                        </button>
                    </div>
                </div>
            );
        };

        // --- COMPONENTE PRINCIPAL ---
        function App() {
            const [selectedYear] = useState(2026);
            const [modalData, setModalData] = useState({ isOpen: false, dateStr: null, event: null });

            const handleDayClick = (dateStr, event) => {
                setModalData({ isOpen: true, dateStr, event });
            };

            return (
                <div className="w-full bg-white border-4 border-[#3b0764] shadow-2xl rounded-sm overflow-hidden relative flex flex-col p-4 md:p-8">
                    
                    {/* MARCA DE AGUA DEL FONDO (AQUÍ CARGA TU IMAGEN) */}
                    <div className="watermark-bg">
                        <img 
                            src="./img/img.png" 
                            alt="Logo Franja Morada" 
                        />
                    </div>

                    {/* TÍTULO */}
                    <header className="relative z-10 text-center mb-8 md:mb-12 mt-4">
                        <h1 className="text-2xl md:text-4xl font-black text-[#eab308] tracking-wider uppercase" style={{ textShadow: '1px 1px 2px #3b0764' }}>
                            CALENDARIO ACADÉMICO 2026
                        </h1>
                        <p className="text-xs md:text-sm text-[#3b0764] font-bold mt-1 tracking-widest">Hacé clic en cualquier fecha coloreada para ver los detalles</p>
                    </header>

                    {/* GRILLA DE MESES (3 columnas como en tu foto) */}
                    <main className="relative z-10 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-y-8 gap-x-2 mb-10">
                        {Array.from({ length: 12 }).map((_, index) => (
                            <MonthCalendar 
                                key={index} 
                                year={selectedYear} 
                                month={index} 
                                onDayClick={handleDayClick}
                            />
                        ))}
                    </main>

                    {/* LEYENDA (Idéntica a la imagen) */}
                    <footer className="relative z-10 grid grid-cols-1 md:grid-cols-3 gap-y-4 gap-x-4 text-xs md:text-sm font-bold text-[#3b0764] mt-auto pt-6 border-t border-slate-200/50">
                        
                        <div className="flex flex-col gap-3 items-center md:items-start">
                            <div className="flex items-center gap-2 cursor-pointer hover:opacity-80">
                                <div className={`w-5 h-5 md:w-6 md:h-6 rounded-sm ${EVENT_TYPES.INICIO.color}`}></div>
                                <span>{EVENT_TYPES.INICIO.label}</span>
                            </div>
                            <div className="flex items-center gap-2 cursor-pointer hover:opacity-80">
                                <div className={`w-5 h-5 md:w-6 md:h-6 rounded-sm ${EVENT_TYPES.ORD.color}`}></div>
                                <span>{EVENT_TYPES.ORD.label}</span>
                            </div>
                        </div>

                        <div className="flex flex-col gap-3 items-center md:items-start">
                            <div className="flex items-center gap-2 cursor-pointer hover:opacity-80">
                                <div className={`w-5 h-5 md:w-6 md:h-6 rounded-sm ${EVENT_TYPES.EXTRA.color}`}></div>
                                <span>{EVENT_TYPES.EXTRA.label}</span>
                            </div>
                            <div className="flex items-center gap-2 cursor-pointer hover:opacity-80">
                                <div className={`w-5 h-5 md:w-6 md:h-6 rounded-sm ${EVENT_TYPES.FERIADO.color}`}></div>
                                <span>{EVENT_TYPES.FERIADO.label}</span>
                            </div>
                        </div>

                        <div className="flex flex-col gap-3 items-center md:items-start">
                            <div className="flex items-center gap-2 cursor-pointer hover:opacity-80">
                                <div className={`w-5 h-5 md:w-6 md:h-6 rounded-sm ${EVENT_TYPES.RECESO.color}`}></div>
                                <span>{EVENT_TYPES.RECESO.label}</span>
                            </div>
                            <div className="flex items-center gap-2 cursor-pointer hover:opacity-80">
                                <div className={`w-5 h-5 md:w-6 md:h-6 rounded-sm ${EVENT_TYPES.FIN.color}`}></div>
                                <span>{EVENT_TYPES.FIN.label}</span>
                            </div>
                        </div>

                    </footer>

                    {/* RED SOCIAL */}
                    <div className="relative z-10 text-center md:text-right mt-6 md:-mt-6 text-[#3b0764] font-bold text-sm flex items-center justify-center md:justify-end gap-1 opacity-90">
                        <i className="fab fa-instagram text-lg"></i> FM.EXACTAS.CTA
                    </div>
                    <p> ALBA DE ESCOBAL </p>

                    <DayModal 
                        isOpen={modalData.isOpen} 
                        dateStr={modalData.dateStr} 
                        event={modalData.event} 
                        onClose={() => setModalData({ ...modalData, isOpen: false })} 
                    />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
